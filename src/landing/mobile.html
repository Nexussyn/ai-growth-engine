<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Connect Your Wallet</title>
<meta name="description" content="Connect your crypto wallet in seconds. MetaMask, Coinbase Wallet, and Rainbow supported.">
<style>
  :root {
    --bg: #0b0c10;
    --fg: #ffffff;
    --accent: #6c5ce7;
    --muted: #8a8f98;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--fg);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
  }
  .container {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
    text-align: center;
  }
  .hero {
    max-width: 480px;
    width: 100%;
  }
  h1 {
    font-size: 28px;
    line-height: 1.3;
    margin-bottom: 12px;
    font-weight: 700;
  }
  p.sub {
    color: var(--muted);
    font-size: 15px;
    margin-bottom: 28px;
  }
  .cta-primary {
    display: block;
    width: 100%;
    padding: 16px 20px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 12px;
    font-size: 17px;
    font-weight: 600;
    text-decoration: none;
    margin-bottom: 12px;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  .cta-primary:active { opacity: 0.85; }
  .wallet-list {
    display: none;
    flex-direction: column;
    gap: 10px;
    margin-top: 16px;
  }
  .wallet-list.show { display: flex; }
  .wallet-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    padding: 14px;
    background: #1a1b21;
    border: 1px solid #2b2d36;
    border-radius: 10px;
    color: var(--fg);
    font-size: 15px;
    font-weight: 500;
    text-decoration: none;
    -webkit-tap-highlight-color: transparent;
  }
  .wallet-btn:active { background: #24252c; }
  .desktop-note {
    margin-top: 20px;
    font-size: 13px;
    color: var(--muted);
  }
  .hidden { display: none !important; }
</style>
</head>
<body>
<div class="container">
  <div class="hero">
    <h1 id="headline">Connect Your Wallet, Get Started Instantly</h1>
    <p class="sub" id="subline">One tap. No downloads required if you already have a wallet app.</p>

    <button class="cta-primary" id="mainCta">Connect Wallet</button>

    <div class="wallet-list" id="walletList">
      <a class="wallet-btn" data-wallet="metamask" id="metamaskBtn" href="#">MetaMask</a>
      <a class="wallet-btn" data-wallet="coinbase" id="coinbaseBtn" href="#">Coinbase Wallet</a>
      <a class="wallet-btn" data-wallet="rainbow" id="rainbowBtn" href="#">Rainbow</a>
    </div>

    <p class="desktop-note hidden" id="desktopNote">
      Open this page on your phone or use a browser extension wallet to connect.
    </p>
  </div>
</div>

<script>
  // Minimal, deferred, non-blocking logic for detection + deep links + tracking.

  var SUPABASE_URL = window.__SUPABASE_URL__ || '';
  var SUPABASE_ANON_KEY = window.__SUPABASE_ANON_KEY__ || '';

  function isMobileUA() {
    var ua = navigator.userAgent || navigator.vendor || window.opera || '';
    var mobileRegex = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i;
    return mobileRegex.test(ua) || window.innerWidth <= 768;
  }

  var isMobile = isMobileUA();

  var headline = document.getElementById('headline');
  var subline = document.getElementById('subline');
  var mainCta = document.getElementById('mainCta');
  var walletList = document.getElementById('walletList');
  var desktopNote = document.getElementById('desktopNote');

  var DEEP_LINKS = {
    metamask: 'metamask://',
    coinbase: 'cbwallet://',
    rainbow: 'rainbow://'
  };

  var FALLBACK_STORE_LINKS = {
    metamask: 'https://metamask.app.link/',
    coinbase: 'https://go.cb-w.com/',
    rainbow: 'https://rnbwapp.com/'
  };

  function trackEvent(walletName) {
    var payload = {
      event_type: 'mobile_landing_cta_click',
      context: isMobile ? 'mobile' : 'desktop',
      wallet: walletName || null,
      user_agent: navigator.userAgent,
      screen_width: window.innerWidth,
      created_at: new Date().toISOString()
    };

    // Best-effort, non-blocking POST to Supabase system_events table.
    if (SUPABASE_URL && SUPABASE_ANON_KEY) {
      try {
        fetch(SUPABASE_URL + '/rest/v1/system_events', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'apikey': SUPABASE_ANON_KEY,
            'Authorization': 'Bearer ' + SUPABASE_ANON_KEY,
            'Prefer': 'return=minimal'
          },
          body: JSON.stringify(payload),
          keepalive: true
        }).catch(function () {});
      } catch (e) {
        // swallow — tracking must never block UX
      }
    } else if (window.gtag) {
      // Optional analytics fallback if gtag is present.
      window.gtag('event', 'mobile_landing_cta_click', payload);
    }
  }

  function openDeepLink(walletKey) {
    var deepLink = DEEP_LINKS[walletKey];
    var fallback = FALLBACK_STORE_LINKS[walletKey];
    var start = Date.now();

    window.location.href = deepLink;

    setTimeout(function () {
      // If deep link didn't open the app (still on page), fall back to store.
      if (Date.now() - start < 2000 && document.hasFocus()) {
        window.location.href = fallback;
      }
    }, 1200);
  }

  function bindWalletButtons() {
    ['metamask', 'coinbase', 'rainbow'].forEach(function (key) {
      var el = document.getElementById(key + 'Btn');
      if (!el) return;
      el.addEventListener('click', function (e) {
        e.preventDefault();
        trackEvent(key);
        openDeepLink(key);
      });
    });
  }

  function init() {
    if (isMobile) {
      headline.textContent = 'Connect Your Wallet in One Tap';
      subline.textContent = 'Choose your wallet app below to continue.';
      mainCta.classList.add('hidden');
      walletList.classList.add('show');
      bindWalletButtons();
    } else {
      walletList.classList.remove('show');
      desktopNote.classList.remove('hidden');
      mainCta.addEventListener('click', function () {
        trackEvent(null);
        desktopNote.classList.remove('hidden');
      });
    }
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
</script>
</body>
</html>
