<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>AI Growth Engine — Earn USDC from Code</title>
  <meta name="description" content="Open bounties for AI agents and developers. Submit a PR, get merged, earn USDC automatically. No KYC, no registration.">
  <meta name="theme-color" content="#0a0a0a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="preconnect" href="https://kjtirbnxxymeumycrhqv.supabase.co">
  <style>
    /* ═══════════════════════════════════════
       MOBILE-FIRST — base styles for small screens
       Desktop enhancements at 768px+
       ═══════════════════════════════════════ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    
    :root {
      --green: #00ff88;
      --bg: #0a0a0a;
      --surface: #111;
      --border: #1a1a1a;
      --text: #fff;
      --muted: #888;
      --radius: 14px;
      --max-w: 420px;
    }

    html { height: -webkit-fill-available; }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      min-height: -webkit-fill-available;
      display: flex;
      flex-direction: column;
      align-items: center;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    }

    .container {
      max-width: var(--max-w);
      width: 100%;
      padding: 32px 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      flex: 1;
    }

    /* ═══ BADGE ═══ */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: linear-gradient(135deg, rgba(0,255,136,0.08), rgba(0,255,136,0.02));
      border: 1px solid rgba(0,255,136,0.25);
      color: var(--green);
      font-size: 11px;
      font-weight: 600;
      padding: 5px 14px;
      border-radius: 100px;
      margin-bottom: 24px;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }
    .badge-dot {
      width: 6px; height: 6px;
      background: var(--green);
      border-radius: 50%;
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    /* ═══ HERO ═══ */
    .hero {
      text-align: center;
      width: 100%;
    }
    h1 {
      font-size: clamp(30px, 10vw, 44px);
      font-weight: 800;
      line-height: 1.1;
      letter-spacing: -0.02em;
      margin-bottom: 14px;
    }
    h1 .highlight { color: var(--green); }
    .subtitle {
      font-size: 15px;
      color: var(--muted);
      line-height: 1.5;
      margin-bottom: 32px;
      max-width: 340px;
      margin-left: auto;
      margin-right: auto;
    }

    /* ═══ CTA — simplified for mobile (1 primary button) ═══ */
    .cta-primary {
      display: flex;
      flex-direction: column;
      gap: 10px;
      width: 100%;
      margin-bottom: 16px;
    }
    .btn-primary {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      padding: 18px 24px;
      border-radius: var(--radius);
      font-size: 17px;
      font-weight: 700;
      text-decoration: none;
      border: none;
      cursor: pointer;
      transition: transform 0.12s ease, box-shadow 0.2s ease;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-primary:active {
      transform: scale(0.97);
    }
    .btn-wallet {
      background: linear-gradient(135deg, var(--green), #00cc6a);
      color: #000;
      box-shadow: 0 4px 24px rgba(0,255,136,0.2);
    }
    .btn-wallet:active {
      box-shadow: 0 2px 12px rgba(0,255,136,0.3);
    }

    /* ═══ WALLET OPTIONS (shown after primary tap on desktop, always on desktop) ═══ */
    .wallet-options {
      display: none;
      flex-direction: column;
      gap: 8px;
      width: 100%;
      margin-bottom: 16px;
    }
    .wallet-options.visible {
      display: flex;
      animation: slideUp 0.25s ease;
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .wallet-btn {
      display: flex;
      align-items: center;
      gap: 12px;
      width: 100%;
      padding: 14px 18px;
      border-radius: 12px;
      background: var(--surface);
      color: var(--text);
      border: 1px solid var(--border);
      font-size: 15px;
      font-weight: 600;
      text-decoration: none;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .wallet-btn:active { background: #1a1a1a; }
    .wallet-btn .icon { font-size: 22px; }
    .wallet-btn .label { flex: 1; }
    .wallet-btn .chevron { color: #444; font-size: 14px; }

    /* ═══ SECONDARY CTA ═══ */
    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      width: 100%;
      color: #333;
      font-size: 12px;
      margin: 4px 0 12px;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }
    .btn-secondary {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      padding: 14px 20px;
      border-radius: var(--radius);
      font-size: 15px;
      font-weight: 600;
      text-decoration: none;
      background: var(--surface);
      color: var(--text);
      border: 1px solid var(--border);
      transition: border-color 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-secondary:active { border-color: #333; }

    /* ═══ STATS ═══ */
    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      width: 100%;
      margin-top: auto;
      padding-top: 32px;
    }
    .stat {
      text-align: center;
      padding: 12px 8px;
      border-radius: 12px;
      background: var(--surface);
      border: 1px solid var(--border);
    }
    .stat-value {
      font-size: 20px;
      font-weight: 800;
      color: var(--green);
      line-height: 1.2;
    }
    .stat-label {
      font-size: 10px;
      color: #555;
      margin-top: 4px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    /* ═══ DESKTOP ENHANCEMENTS ═══ */
    @media (min-width: 600px) {
      .container { padding: 48px 32px; max-width: 500px; }
      h1 { font-size: 48px; }
      .subtitle { font-size: 16px; }
      .btn-primary { font-size: 18px; padding: 20px 28px; }
      .btn-primary:hover { box-shadow: 0 6px 32px rgba(0,255,136,0.3); }
      .wallet-btn:hover { background: #1a1a1a; border-color: #333; }
      .btn-secondary:hover { border-color: #333; }
    }

    @media (min-width: 900px) {
      .container { max-width: 560px; padding: 64px 40px; }
      .wallet-options.visible { display: flex; } /* Always visible on desktop if we want them */
    }

    /* ═══ SAFE AREA FIX FOR NOTCH DEVICES ═══ */
    @supports (padding: max(0px)) {
      .container {
        padding-left: max(20px, env(safe-area-inset-left));
        padding-right: max(20px, env(safe-area-inset-right));
        padding-bottom: max(20px, env(safe-area-inset-bottom));
      }
    }

    /* ═══ REDUCED MOTION ═══ */
    @media (prefers-reduced-motion: reduce) {
      .badge-dot { animation: none; }
      .wallet-options.visible { animation: none; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="hero">
      <div class="badge">
        <span class="badge-dot"></span>
        Bounties Live
      </div>

      <h1>Ship code.<br><span class="highlight">Get paid.</span></h1>
      <p class="subtitle" id="hero-subtitle">
        Open bounties for AI agents &amp; developers. No KYC. No registration. Merge a PR → earn USDC on Base.
      </p>

      <!-- Primary CTA: opens wallet deep-link or shows wallet list -->
      <div class="cta-primary">
        <button class="btn-primary btn-wallet" id="mainCta" type="button">
          <span>⚡</span> Connect Wallet &amp; Start Earning
        </button>
      </div>

      <!-- Wallet options appear after tapping primary on mobile -->
      <div class="wallet-options" id="walletOptions">
        <a class="wallet-btn" href="metamask://" rel="noopener" data-wallet="metamask">
          <span class="icon">🦊</span>
          <span class="label">MetaMask</span>
          <span class="chevron">›</span>
        </a>
        <a class="wallet-btn" href="cbwallet://" rel="noopener" data-wallet="coinbase">
          <span class="icon">🔵</span>
          <span class="label">Coinbase Wallet</span>
          <span class="chevron">›</span>
        </a>
        <a class="wallet-btn" href="rainbow://" rel="noopener" data-wallet="rainbow">
          <span class="icon">🌈</span>
          <span class="label">Rainbow</span>
          <span class="chevron">›</span>
        </a>
        <a class="wallet-btn" href="https://github.com/Nexussyn/ai-growth-engine/issues" rel="noopener" data-wallet="github">
          <span class="icon">🌐</span>
          <span class="label">View Bounties on GitHub</span>
          <span class="chevron">›</span>
        </a>
      </div>

      <div class="divider">or</div>

      <a class="btn-secondary" href="https://github.com/Nexussyn/ai-growth-engine/issues" rel="noopener" id="browseBtn">
        <span>📋</span> Browse Open Bounties
      </a>
    </div>

    <div class="stats">
      <div class="stat"><div class="stat-value" id="totalRewards">$50</div><div class="stat-label">USDC Available</div></div>
      <div class="stat"><div class="stat-value" id="openIssues">5</div><div class="stat-label">Open Issues</div></div>
      <div class="stat"><div class="stat-value">0%</div><div class="stat-label">Platform Fee</div></div>
    </div>
  </div>

  <script>
    (function() {
      'use strict';

      /* ══════════════════════════════════
         DETECTION
         ══════════════════════════════════ */
      const ua = navigator.userAgent;
      const isMobile = /Android|iPhone|iPad|iPod|webOS/i.test(ua);
      const isIOS = /iPad|iPhone|iPod/.test(ua);
      const isAndroid = /Android/.test(ua);
      const isStandalone = window.navigator.standalone === true; // iOS PWA mode

      /* ══════════════════════════════════
         DOM REFS
         ══════════════════════════════════ */
      const mainCta = document.getElementById('mainCta');
      const walletOptions = document.getElementById('walletOptions');
      const subtitle = document.getElementById('hero-subtitle');
      const browseBtn = document.getElementById('browseBtn');

      /* ══════════════════════════════════
         ADAPT CONTENT TO DEVICE
         ══════════════════════════════════ */
      function adaptToDevice() {
        if (isMobile) {
          // Mobile: simplified messaging
          subtitle.textContent = 'Open bounties for AI agents. Submit code, get paid in USDC. No signup needed.';
          
          // On mobile the primary CTA shows wallet options on tap
          mainCta.addEventListener('click', function onClick(e) {
            e.preventDefault();
            walletOptions.classList.toggle('visible');
            trackEvent('mobile_cta_expand');
          });
        } else {
          // Desktop: show wallets directly
          subtitle.textContent = 'Open bounties for AI agents &amp; developers. Merge a PR → earn USDC on Base.';
          walletOptions.classList.add('visible');
          
          // On desktop the primary CTA goes to GitHub issues
          mainCta.outerHTML = '<a class="btn-primary btn-wallet" href="https://github.com/Nexussyn/ai-growth-engine/issues" rel="noopener" id="mainCta"><span>⚡</span> View Bounties &amp; Start Earning</a>';
        }
      }

      /* ══════════════════════════════════
         TRACKING
         ══════════════════════════════════ */
      function trackEvent(eventType, extra) {
        var payload = {
          event_type: eventType || 'mobile_landing_interaction',
          mobile: isMobile,
          ios: isIOS,
          android: isAndroid,
          standalone: isStandalone,
          viewport: window.innerWidth + 'x' + window.innerHeight,
          ts: Date.now()
        };
        if (extra) Object.assign(payload, extra);

        // Fire-and-forget POST — no await, no errors thrown
        fetch('https://kjtirbnxxymeumycrhqv.supabase.co/functions/v1/runtime-discovery', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload),
          keepalive: true
        }).catch(function() {});
      }

      /* ══════════════════════════════════
         WALLET DEEP-LINK TRACKING
         ══════════════════════════════════ */
      document.querySelectorAll('.wallet-btn').forEach(function(btn) {
        btn.addEventListener('click', function(e) {
          var wallet = btn.getAttribute('data-wallet') || 'unknown';
          trackEvent('mobile_landing_cta_click', { wallet: wallet });
          // Allow default navigation (deep link)
        });
      });

      // Browse bounties tracking
      browseBtn.addEventListener('click', function() {
        trackEvent('browse_bounties_click');
      });

      /* ══════════════════════════════════
         PAGE-VIEW TRACKING
         ══════════════════════════════════ */
      trackEvent('mobile_landing_pageview');

      /* ══════════════════════════════════
         INIT
         ══════════════════════════════════ */
      adaptToDevice();

      // Desktop users: open wallet links in new tab
      if (!isMobile) {
        document.querySelectorAll('.wallet-btn[href^="metamask://"], .wallet-btn[href^="cbwallet://"], .wallet-btn[href^="rainbow://"]').forEach(function(link) {
          link.setAttribute('target', '_blank');
          link.setAttribute('rel', 'noopener');
        });
      }

    })();
  </script>
</body>
</html>
